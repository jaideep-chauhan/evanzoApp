buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.0.21"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.4.0")
        classpath("com.facebook.react:react-native-gradle-plugin:0.78.1")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.21")
        // Firebase / Google Services. Processes google-services.json and
        // injects the FCM / Crashlytics keys at build time. Required by
        // @react-native-firebase/app + /messaging modules in package.json.
        classpath("com.google.gms:google-services:4.4.2")
    }
}

apply plugin: "com.facebook.react.rootproject"
