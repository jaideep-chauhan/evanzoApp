plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'com.facebook.react'
    // Firebase / Google Services. Reads android/app/google-services.json
    // and bakes the FCM keys into the build. Without this plugin, the
    // @react-native-firebase native modules can't initialize and the app
    // crashes on launch (or fails the Gradle config step entirely).
    id 'com.google.gms.google-services'
}

// Release-signing credentials are read from android/local.properties, which is
// git-ignored, so the real keystore password never lives in a tracked file.
// Falls back to project properties (gradle.properties / -P flags) for CI.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("local.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { keystoreProperties.load(it) }
}

android {
    namespace "com.x4x90studio.evnzo"
    compileSdkVersion rootProject.ext.compileSdkVersion
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion

    // Skip the memory-heavy lintVitalRelease pass on release builds. It isn't
    // needed for a test APK and was OOM-crashing the Gradle daemon.
    lint {
        checkReleaseBuilds false
        abortOnError false
    }

    // Declare the New Architecture native build explicitly (local copy of
    // RN's default-app-setup CMakeLists + OnLoad.cpp) instead of relying on
    // the RN gradle plugin to inject the path in finalizeDsl. The injected
    // path builds libappmodules.so but doesn't fully wire it into the
    // variant's task graph, so (a) clean builds race the per-library codegen
    // and (b) libappmodules.so never gets packaged → SoLoader fails at launch
    // with "couldn't find DSO to load: libappmodules.so".
    externalNativeBuild {
        cmake {
            path "src/main/jni/CMakeLists.txt"
        }
    }

    defaultConfig {
        applicationId "com.x4x90studio.evnzo"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 34
        versionName "2.0.2"

        // RN apps with lots of native modules routinely cross Android's
        // 65K methods limit. Multidex splits the dex output into multiple
        // files; multidex-config.txt keeps the classes we need in the
        // primary dex (boot-critical, e.g. application class).
        multiDexEnabled true
        multiDexKeepFile file('multidex-config.txt')

        // Bundle native debug symbols into the AAB so Play Console can
        // symbolicate native crashes / ANRs. Without this, every release
        // pings the "you've not uploaded debug symbols" warning.
        ndk {
            debugSymbolLevel 'SYMBOL_TABLE'
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            def storeFileName = keystoreProperties['MYAPP_UPLOAD_STORE_FILE'] ?:
                    (project.hasProperty('MYAPP_UPLOAD_STORE_FILE') ? MYAPP_UPLOAD_STORE_FILE : null)
            if (storeFileName != null) {
                storeFile file(storeFileName)
                storePassword keystoreProperties['MYAPP_UPLOAD_STORE_PASSWORD'] ?:
                        project.findProperty('MYAPP_UPLOAD_STORE_PASSWORD')
                keyAlias keystoreProperties['MYAPP_UPLOAD_KEY_ALIAS'] ?:
                        project.findProperty('MYAPP_UPLOAD_KEY_ALIAS')
                keyPassword keystoreProperties['MYAPP_UPLOAD_KEY_PASSWORD'] ?:
                        project.findProperty('MYAPP_UPLOAD_KEY_PASSWORD')
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            // Speed up local-emulator dev: restrict native ABIs via the
            // RN-standard `reactNativeArchitectures` gradle property
            // (e.g. -PreactNativeArchitectures=x86_64) instead of custom
            // buildType abiFilters. Custom ndk/externalNativeBuild
            // abiFilters here detach the externalNativeBuild output
            // (libappmodules.so) from packaging, so SoLoader fails with
            // "couldn't find DSO to load: libappmodules.so" at launch.
        }
        release {
            signingConfig signingConfigs.release
            shrinkResources false
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            // Play Store only accepts ARM ABIs. Skipping x86 / x86_64
            // cuts the AAB size roughly in half.
            ndk {
                abiFilters "armeabi-v7a", "arm64-v8a"
            }
            externalNativeBuild {
                cmake {
                    abiFilters "armeabi-v7a", "arm64-v8a"
                }
            }
            // x86 / x86_64 prebuilt .so are stripped from the release AAB via
            // an androidComponents.onVariants block below — NOT a buildType
            // `packaging { jniLibs { excludes += ... } }` block, because that
            // mutates a shared list and leaks the x86_64 exclude into the debug
            // variant too, which strips libappmodules.so + libimagepipeline.so
            // etc. from the emulator build and crashes the app at launch.
        }
    }
}

react {
    autolinkLibrariesWithApp()
}

// x86/x86_64 are kept out of the release AAB via ABI filters: the default
// `reactNativeArchitectures` (gradle.properties) is ARM-only and the release
// buildType's ndk/externalNativeBuild abiFilters are ARM-only too, so no x86
// prebuilt .so are packaged. The x86_64 emulator debug build opts back in with
// `-PreactNativeArchitectures=x86_64`.

def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

dependencies {
    implementation("com.facebook.react:react-android")
    implementation project(':react-native-vector-icons')

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation(jscFlavor)
    }
}

apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"
