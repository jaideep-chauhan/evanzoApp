plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'com.facebook.react'
    // Firebase / Google Services. Reads android/app/google-services.json
    // and bakes the FCM keys into the build. Without this plugin, the
    // @react-native-firebase native modules can't initialize and the app
    // crashes on launch (or fails the Gradle config step entirely).
    id 'com.google.gms.google-services'
}

android {
    namespace "com.x4x90studio.evnzo"
    compileSdkVersion rootProject.ext.compileSdkVersion
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion

    defaultConfig {
        applicationId "com.x4x90studio.evnzo"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 29
        versionName "1.9"

        // RN apps with lots of native modules routinely cross Android's
        // 65K methods limit. Multidex splits the dex output into multiple
        // files; multidex-config.txt keeps the classes we need in the
        // primary dex (boot-critical, e.g. application class).
        multiDexEnabled true
        multiDexKeepFile file('multidex-config.txt')

        // Bundle native debug symbols into the AAB so Play Console can
        // symbolicate native crashes / ANRs. Without this, every release
        // pings the "you've not uploaded debug symbols" warning.
        ndk {
            debugSymbolLevel 'SYMBOL_TABLE'
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                storeFile file(MYAPP_UPLOAD_STORE_FILE)
                storePassword MYAPP_UPLOAD_STORE_PASSWORD
                keyAlias MYAPP_UPLOAD_KEY_ALIAS
                keyPassword MYAPP_UPLOAD_KEY_PASSWORD
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            // Speed up local-emulator dev: only build native libs for the
            // emulator's ABI (x86_64 on Intel Macs / modern emulators).
            // ndk.abiFilters limits which compiled libs get bundled into
            // the APK, but CMake still compiles all ABIs by default —
            // externalNativeBuild.cmake.abiFilters is what actually
            // prevents the compile and is the real time saver.
            // Change to "arm64-v8a" for a physical device over USB.
            ndk {
                abiFilters "x86_64"
            }
            externalNativeBuild {
                cmake {
                    abiFilters "x86_64"
                }
            }
        }
        release {
            signingConfig signingConfigs.release
            shrinkResources false
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            // Play Store only accepts ARM ABIs. Skipping x86 / x86_64
            // cuts the AAB size roughly in half.
            ndk {
                abiFilters "armeabi-v7a", "arm64-v8a"
            }
            externalNativeBuild {
                cmake {
                    abiFilters "armeabi-v7a", "arm64-v8a"
                }
            }
        }
    }
}

react {
    autolinkLibrariesWithApp()
}

def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

dependencies {
    implementation("com.facebook.react:react-android")
    implementation project(':react-native-vector-icons')

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation(jscFlavor)
    }
}

apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"
